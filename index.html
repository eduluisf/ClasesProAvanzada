<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Programacion Avanzada</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, sans-serif;
      background: #f9f9f9;
      color: #111;
      min-height: 100vh;
      padding: 3rem 1.5rem;
    }

    header {
      max-width: 700px;
      margin: 0 auto 3rem;
      border-bottom: 2px solid #111;
      padding-bottom: 1rem;
    }

    header h1 {
      font-size: 1.8rem;
      font-weight: 800;
      letter-spacing: -0.02em;
    }

    header p {
      color: #555;
      font-size: 0.95rem;
      margin-top: 0.3rem;
    }

    .seccion {
      max-width: 700px;
      margin: 0 auto 2.5rem;
    }

    .seccion h2 {
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #888;
      margin-bottom: 0.75rem;
    }

    .lista {
      display: flex;
      flex-direction: column;
      gap: 0.4rem;
    }

    .item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.85rem 1rem;
      background: #fff;
      border: 1px solid #e0e0e0;
      border-radius: 6px;
      text-decoration: none;
      color: #111;
      font-size: 0.95rem;
      font-weight: 500;
      transition: border-color 0.15s, background 0.15s;
    }

    .item:hover {
      border-color: #111;
      background: #f0f0f0;
    }

    .item .flecha {
      color: #aaa;
      font-size: 1rem;
    }

    .vacio {
      padding: 0.85rem 1rem;
      background: #fff;
      border: 1px dashed #ddd;
      border-radius: 6px;
      color: #aaa;
      font-size: 0.9rem;
    }

    #estado {
      max-width: 700px;
      margin: 0 auto;
      color: #aaa;
      font-size: 0.85rem;
    }
  </style>
</head>
<body>

<header>
  <h1>Programacion Avanzada</h1>
  <p>Material de clases y ejercicios</p>
</header>

<div class="seccion">
  <h2>Clases</h2>
  <div class="lista" id="lista-clases">
    <div class="vacio">Cargando...</div>
  </div>
</div>

<div class="seccion">
  <h2>Materiales</h2>
  <div class="lista" id="lista-ejercicios">
    <div class="vacio">Cargando...</div>
  </div>
</div>

<div id="estado"></div>

<script>
  const GITHUB_USER = "eduluisf";
  const GITHUB_REPO = "ClasesProAvanzada";

  function formatNombre(nombre) {
    return nombre.replace(/-/g, " ").replace(/\b\w/g, c => c.toUpperCase());
  }

  function renderLista(contenedor, carpetas) {
    contenedor.innerHTML = "";
    if (carpetas.length === 0) {
      contenedor.innerHTML = '<div class="vacio">No hay contenido todavia</div>';
      return;
    }
    carpetas.forEach(carpeta => {
      const a = document.createElement("a");
      a.href = `${carpeta.name}/`;
      a.className = "item";
      a.innerHTML = `<span>${formatNombre(carpeta.name)}</span><span class="flecha">&#8594;</span>`;
      contenedor.appendChild(a);
    });
  }

  async function cargar() {
    const listaClases     = document.getElementById("lista-clases");
    const listaEjercicios = document.getElementById("lista-ejercicios");
    const estado          = document.getElementById("estado");

    try {
      const res = await fetch(
        `https://api.github.com/repos/${GITHUB_USER}/${GITHUB_REPO}/contents/`,
        { headers: { Accept: "application/vnd.github.v3+json" } }
      );
      if (!res.ok) throw new Error(`${res.status}`);

      const items = await res.json();
      const carpetas = items
        .filter(i => i.type === "dir" && !i.name.startsWith(".") && i.name !== "__pycache__")
        .sort((a, b) => a.name.localeCompare(b.name, undefined, { numeric: true }));

      const clases     = carpetas.filter(c => c.name.startsWith("clase"));
      const ejercicios = carpetas.filter(c => c.name.startsWith("material"));

      renderLista(listaClases,     clases);
      renderLista(listaEjercicios, ejercicios);

      estado.textContent = `${clases.length} clase${clases.length !== 1 ? "s" : ""} · ${ejercicios.length} carpeta${ejercicios.length !== 1 ? "s" : ""} de materiales`;

    } catch (err) {
      listaClases.innerHTML     = '<div class="vacio">No se pudo cargar el contenido</div>';
      listaEjercicios.innerHTML = '<div class="vacio">No se pudo cargar el contenido</div>';
      estado.textContent = "Verifica que el repositorio sea publico";
    }
  }

  cargar();
</script>

</body>
</html>
